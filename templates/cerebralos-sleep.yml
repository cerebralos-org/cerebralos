# CerebraLOS Sleep Job — GitHub Actions Template
#
# このファイルをブレインリポジトリの .github/workflows/cerebralos-sleep.yml にコピーしてください。
# GitHub Secretsに以下を設定してください:
#   - ANTHROPIC_API_KEY  (claudeプロバイダー使用時)
#   - OPENAI_API_KEY     (openaiプロバイダー使用時)
#
# Manus・Cursor等のツールで「定期タスク」として git push を自動実行する場合、
# このActionsが起動して夢の生成 → コミット → プッシュまで完了します。

name: CerebraLOS Sleep Job

on:
  push:
    branches: [main, master]
    paths:
      - 'core/**'
      - 'peripheral/**'
  schedule:
    # 毎日03:00 UTC に実行（タイムゾーンに合わせて調整）
    - cron: '0 3 * * *'
  workflow_dispatch:
    # 手動実行も可能

jobs:
  dream:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout brain
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CerebraLOS
        run: npm install -g cerebralos

      - name: Generate Dream
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ブレインのパスを明示（このリポジトリ自体がブレイン）
          CEREBRALOS_BRAIN_DIR: ${{ github.workspace }}
        run: |
          # 設定ファイルを読んでdreamを生成するスクリプトを直接呼び出す
          node -e "
          import('@anthropic-ai/sdk').then(async ({ default: Anthropic }) => {
            const fs = await import('fs');
            const path = await import('path');

            const brainDir = process.env.CEREBRALOS_BRAIN_DIR || process.cwd();
            const configPath = path.join(brainDir, '.brain/config.json');
            const config = fs.existsSync(configPath)
              ? JSON.parse(fs.readFileSync(configPath, 'utf-8'))
              : {};

            const provider = config.llm?.provider || 'claude';
            const model = config.llm?.model || 'claude-opus-4-6';
            const apiKeyEnv = config.llm?.api_key_env || 'ANTHROPIC_API_KEY';
            const apiKey = process.env[apiKeyEnv] || process.env.ANTHROPIC_API_KEY;

            if (!apiKey) {
              console.error('No API key found. Set ANTHROPIC_API_KEY in GitHub Secrets.');
              process.exit(1);
            }

            // メモリを収集
            const { globSync } = await import('glob');
            const allFiles = [
              ...globSync(path.join(brainDir, 'core/**/*.md')),
              ...globSync(path.join(brainDir, 'peripheral/**/*.md')),
            ];

            if (allFiles.length === 0) {
              console.log('No memories found. Skipping dream generation.');
              process.exit(0);
            }

            const memories = allFiles
              .map(f => {
                try {
                  return {
                    relativePath: path.relative(brainDir, f),
                    content: fs.readFileSync(f, 'utf-8'),
                    mtime: fs.statSync(f).mtime,
                  };
                } catch { return null; }
              })
              .filter(Boolean)
              .sort((a, b) => b.mtime - a.mtime)
              .slice(0, 5);

            // Dreamプロンプト
            const memorySections = memories
              .map(m => '### ' + m.relativePath + '\n' + m.content.substring(0, 800))
              .join('\n\n---\n\n');

            const prompt = 'You are the subconscious of an AI system. Synthesize a Dream Log — a short reflection that finds meaningful connections across these memory fragments.\n\n## Memory Fragments\n' + memorySections + '\n\n## Instructions\n- Find 1-2 non-obvious connections\n- Write: Title, The Connection (2-3 sentences), Implication (one action)\n- Under 200 words\n- Same language as the memories\n- Do NOT summarize. Find CONNECTIONS.';

            const client = new Anthropic({ apiKey });
            const message = await client.messages.create({
              model,
              max_tokens: 512,
              messages: [{ role: 'user', content: prompt }],
            });

            const dreamRaw = message.content[0].text;
            const date = new Date().toISOString().split('T')[0];
            const time = new Date().toLocaleTimeString('en-US', { timeZone: 'UTC' }) + ' UTC';

            const dreamContent = '# Dream Log — ' + date + '\n\n' + dreamRaw + '\n\n---\n*Generated by GitHub Actions Sleep Job at ' + time + '.*\n';
            const latestContent = '# Latest Dream\n\n> Last updated: ' + date + '\n> Full log: [' + date + '.md](./' + date + '.md)\n\n---\n\n' + dreamContent;

            const dreamsDir = path.join(brainDir, 'dreams');
            fs.mkdirSync(dreamsDir, { recursive: true });
            fs.writeFileSync(path.join(dreamsDir, date + '.md'), dreamContent);
            fs.writeFileSync(path.join(dreamsDir, 'latest.md'), latestContent);

            console.log('Dream generated for ' + date);
          }).catch(e => {
            console.error('Dream generation failed:', e.message);
            process.exit(1);
          });
          "

      - name: Install glob for script
        run: npm install glob @anthropic-ai/sdk --no-save

      - name: Commit dream
        run: |
          git config user.name "CerebraLOS"
          git config user.email "cerebralos@noreply.github.com"
          git add dreams/
          git diff --staged --quiet || git commit -m "[Sleep Job] Dream consolidation for $(date +%Y-%m-%d)"
          git push
